<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <!-- BOOTSTRAP JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- CSS PROPIO -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- JS PROPIO -->
    <script defer src="./assets/js/login.js"></script>


</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg bg-secondary navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="menu.html">Menu</a>
                    <a class="nav-link" href="deposit.html">Deposit</a>
                    <a class="nav-link" href="sendmoney.html">Send Money</a>
                    <a class="nav-link" href="transactions.html">Transactions</a>
                    <a class="nav-link active" aria-current="page" href="login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <header>
        <h1 class="text-center mt-5 text-primary ">Inicia sesión en tu Wallet Digital</h1>
    </header>

    <main class="container py-4">

        <section>
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-4">
                    <form id="formLogin">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email:</label>
                            <input type="email" class="form-control" name="email" id="email"
                                placeholder="Introduce correo electrónico" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password:</label>
                            <input type="password" class="form-control" name="password" id="password"
                                placeholder="Introduce contraseña" required>
                        </div>
                        <div>
                            <input type="submit" value="Iniciar Sesión" class="btn btn-info my-1 col-12 mb-3">
                        </div>
                    </form>

                </div>
            </div>
        </section>

    </main>


</body>

</html>

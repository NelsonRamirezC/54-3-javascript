<script>
    //while -> MIENTRAS SE CUMPLA UNA CONDICIONES EJECUTAMOS UN BLOQUE DE CÓDIGO


    let palabraSecreta = "secreto";

    let palabraUsuario = prompt("Ingrese la palabra secreta");

    let intentos = 1;

    while(palabraSecreta != palabraUsuario){

        palabraUsuario = prompt("Te equivocaste, vuelve a intentar adivinar la palabra secreta.");
        intentos++;
    };

    alert("Felicitaciones, encontraste la palabra secreta en los siguientes intentos: " + intentos);

</script>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Flow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./assets/css/style.css">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script defer src="https://momentjs.com/downloads/moment-with-locales.js"></script>

    <script defer type="module" src="./assets/js/script.js"></script>
</head>

<body>

    <header class="py-3">
        <h1 class="text-center">App Task Flow - Gestor de Tareas</h1>
    </header>

    <main class="container">
        <section class="py-3">
            <h2>Crea una nueva tarea...</h2>
            <form id="form-crear-tarea">
                <div class="mb-3">
                    <input type="text" class="form-control" name="descripcion" required
                        placeholder="Agrega la descrición de la tarea...">
                </div>
                <div>
                    <button class="btn btn-primary" id="btn-crear-tarea">Crear Tarea</button>
                    <button class="btn btn-primary d-none" type="button" disabled id="btn-crear-tarea-spinner">
                        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                        <span role="status">Procesando solicitud</span>
                    </button>
                </div>
            </form>
        </section>

        <section class="py-">
            <h2>Listado de tareas...</h2>
            <p>Cantidad de tareas registradas: <span id="span-tareas-total"></span></p>
            <p>Cantidad de tareas pendientes: <span id="span-tareas-pendientes"></span></p>
            <p>Cantidad de tareas finalizadas: <span id="span-tareas-finalizadas"></span></p>
            <div>
                <table class="table d-none" id="tabla-tareas">
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Descripción</th>
                            <th scope="col">Estado</th>
                            <th scope="col">Fecha creación</th>
                            <th scope="col">Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- AQUÍ SE AGREGAN LAS TAREAS DE FORMA DINÁMICA -->
                    </tbody>
                </table>
                <div id="mensaje-sin-tareas" class="d-none">
                    <p class="text-center fs-1 fw-bold">No existen tareas</p>
                </div>

                <div class="d-flex justify-content-center" id="spinner-tabla-loader">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </section>

    </main>


</body>

</html>

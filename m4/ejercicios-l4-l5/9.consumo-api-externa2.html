<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo API 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>

    <main class="container">
        <section class="py-3">
            <h2 class="text-center">Listado de tareas.</h2>

            <div class="row">

                <div class="col-6">
                    <h3>Tareas pendientes</h3>
                    <ul id="tareas-pendientes" class="text-danger">

                    </ul>

                </div>
                <div class="col-6">
                    <h3>Tareas completadas</h3>
                    <ul id="tareas-completadas" class="text-success">

                    </ul>
                </div>
            </div>

        </section>
    </main>


    <script>
        const getTareas = async () => {
            
            try {
                let cantidad = 10;
                let url_base = "https://dummyjson.com/todos?limit=" + cantidad;
                const response = await fetch(url_base);

                const data = await response.json();

                return data.todos;

            } catch (error) {
                console.log(error);
            }
        }


        const cargarTareas = (idElemento, tareas = []) => {

            let registros = "";
            for (const tarea of tareas) {

                let { id, todo, completed } = tarea;

                registros += `<li>ID: ${id}, Tarea: ${todo}</li>`;
            }

            document.getElementById(idElemento).innerHTML = registros;
        }


        //EL EVENTO DOMContentLoaded SE ASEGURA QUE EL DOM SE ENCUENTRA CREADO PARA MANIPULAR SUS ELEMENTOS
        document.addEventListener("DOMContentLoaded", async (event) => {
            const tareas = await getTareas();

            const tareasFinalizadas = tareas.filter(tarea => tarea.completed);
            cargarTareas("tareas-completadas", tareasFinalizadas);

            const tareasPendientes = tareas.filter(tarea => !tarea.completed);
            cargarTareas("tareas-pendientes", tareasPendientes);

        });


    </script>

</body>

</html>
